{% load static %}
<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Objects{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'store/css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{% url 'store:home' %}">OBJEKT</a>
        <nav class="site-nav">
            <a href="{% url 'store:product_list' %}">Shop</a>
            <a href="{% url 'store:cart_detail' %}">Сагс ({{ cart_count }})</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
